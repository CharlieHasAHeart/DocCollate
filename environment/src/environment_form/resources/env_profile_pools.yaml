settings:
  default_app_type: B/S业务系统
  aliases:
    移动应用平台: 移动端应用
  app_type_priors:
    B/S业务系统: 0.2

profiles:
  - app_type: B/S业务系统
    keywords: ["bs", "b/s", "web", "浏览器", "管理平台", "前端", "后端", "业务系统"]
    env__server_os: "Ubuntu 22.04 LTS (64位)"
    env__server_soft: "Nginx 1.24、Node.js 20、MySQL 8.0、Redis 7"
    env__server_model: "云服务器（8核16G）"
    env__server_config: "CPU: 8核；内存: 16GB；存储: 200GB SSD；网络: 千兆"
    env__server_id: "厂商设备"
    env__client_os: "Windows 10/11、macOS 12+ (64位)"
    env__client_soft: "Chrome 120+ / Edge 120+"
    env__client_model: "办公终端（台式机/笔记本）"
    env__client_config: "CPU: 4核；内存: 8GB；存储: 100GB；网络: 宽带"
    env__client_id: "厂商设备"

